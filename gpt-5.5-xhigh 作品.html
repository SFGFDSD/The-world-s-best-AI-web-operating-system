      function openCalculator() {
        createWindow({ appId: 'calculator', title: 'Abacus', icon: 'calculator', width: 360, height: 520 }, content => {
          const keys = ['C', '(', ')', '/', '7', '8', '9', '*', '4', '5', '6', '-', '1', '2', '3', '+', '0', '.', 'DEL', '='];
          content.innerHTML = `<div class="calc-shell"><div class="calc-display">0</div><div class="calc-grid">${keys.map(key => `<button class="calc-key ${key === '=' ? 'accent' : key === 'C' ? 'warn' : ''}" data-key="${key}" type="button">${key}</button>`).join('')}</div></div>`;
          const display = $('.calc-display', content);
          let expr = '';
          const paint = () => { display.textContent = expr || '0'; };
          content.addEventListener('click', event => {
            const key = event.target.closest('[data-key]')?.dataset.key;
            if (!key) return;
            if (key === 'C') expr = '';
            else if (key === 'DEL') expr = expr.slice(0, -1);
            else if (key === '=') {
              try {
                if (!/^[0-9+\-*/().\s%]+$/.test(expr)) throw new Error('bad');
                expr = String(Function(`"use strict"; return (${expr})`)());
              } catch (_) { expr = 'Error'; setTimeout(() => { expr = ''; paint(); }, 900); }
            } else {
              if (expr === 'Error') expr = '';
              expr += key;
            }
            paint();
          });
        });
      }

      function openSettings() {
        createWindow({ appId: 'settings', title: 'Monsoon Settings', icon: 'settings', width: 780, height: 580 }, (content) => {
          content.innerHTML = `
            <div class="app-shell">
              <div class="settings-scroll">
                <section class="settings-section">
                  <div class="section-title">Wallpaper Tide</div>
                  <p class="section-copy">内置壁纸以暴雨海面、雾、棕榈剪影为基调。也可以上传本地图片，文件会写入 /System 并持久化。</p>
                  <div class="wallpaper-choices">
                    ${['storm', 'lagoon', 'ember', 'ink'].map(name => `<button class="wall-choice wall-${name} ${state.config.wallpaper === name ? 'active' : ''}" data-wall="${name}" type="button">${name}</button>`).join('')}
                  </div>
                  <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><button class="tool-button" data-act="upload-wall">${svg('upload')}上传壁纸</button></div>
                </section>
                <section class="settings-section">
                  <div class="section-title">Storage</div>
                  <p class="section-copy storage-copy">正在读取浏览器存储配额...</p>
                  <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><button class="tool-button" data-act="persist">${svg('check')}请求持久化</button><button class="tool-button" data-act="reset">${svg('trash')}一键重置 OPFS</button></div>
                </section>
                <section class="settings-section">
                  <div class="section-title">Native Formats</div>
                  <p class="section-copy">所有格式都可以作为二进制 Blob 存储在 OPFS。浏览器可原生预览或处理的格式如下；zip/tar/gz/tgz 由本文件内置的无依赖解析器解压。</p>
                  <div class="support-grid">${['txt/code', 'html/svg/pdf', 'png/jpg/gif/webp/avif/bmp/ico', 'mp3/wav/ogg/m4a/aac/flac', 'mp4/webm/ogv/mov/m4v', 'zip/tar/gz/tgz', 'any Blob import/export'].map(item => `<span class="support-chip">${item}</span>`).join('')}</div>
                </section>
              </div>
            </div>`;
          const updateEstimate = async () => {
            const estimate = await navigator.storage.estimate?.();
            const persisted = await navigator.storage.persisted?.();
            $('.storage-copy', content).textContent = estimate ? `已用 ${formatBytes(estimate.usage)} / 配额 ${formatBytes(estimate.quota)}。持久化授权：${persisted ? '已启用' : '未确认'}。` : '当前浏览器未暴露 estimate API。';
          };
          content.addEventListener('click', event => runSafe(async () => {
            const wall = event.target.closest('[data-wall]')?.dataset.wall;
            const act = event.target.closest('[data-act]')?.dataset.act;
            if (wall) {
              state.config.wallpaper = wall;
              state.config.wallpaperPath = '';
              await saveConfig();
              await applyWallpaper();
              $$('.wall-choice', content).forEach(btn => btn.classList.toggle('active', btn.dataset.wall === wall));
            }
            if (act === 'upload-wall') wallpaperInput.click();
            if (act === 'persist') { const ok = await navigator.storage.persist?.(); toast(ok ? '浏览器已授予持久化存储' : '浏览器未授予持久化存储'); await updateEstimate(); }
            if (act === 'reset' && confirm('确定清空 OPFS 并重置 Monsoon OS？此操作不可撤销。')) {
              await fs.clear();
              await fs.init();
              await loadConfig();
              await applyWallpaper();
              await renderDesktop();
              toast('OPFS 已重置');
              updateEstimate();
            }
          }));
          updateEstimate();
        });
      }

      async function pickLocalFiles(dest, callback) {
        state.importTarget = normalizePath(dest || '/');
        state.importCallback = callback || null;
        importInput.value = '';
        importInput.click();
      }

      importInput.addEventListener('change', () => runSafe(async () => {
        if (!importInput.files.length) return;
        await importFileList(importInput.files, state.importTarget);
        if (state.importCallback) await state.importCallback();
        await renderDesktop();
      }));

      wallpaperInput.addEventListener('change', () => runSafe(async () => {
        const file = wallpaperInput.files[0];
        if (!file) return;
        const path = await fs.uniquePath('/System', `wallpaper-${stamp()}-${file.name}`);
        await fs.writeFile(path, file, { type: file.type || getMime(file.name) });
        state.config.wallpaper = 'custom';
        state.config.wallpaperPath = path;
        await saveConfig();
        await applyWallpaper();
        toast('自定义壁纸已写入 OPFS');
      }));

      async function importFileList(fileList, dest) {
        const files = Array.from(fileList);
        let count = 0;
        for (const file of files) {
          const target = await fs.uniquePath(dest, file.name || `Imported-${stamp()}`);
          await fs.writeFile(target, file, { type: file.type || getMime(file.name) });
          count += 1;
        }
        toast(`已导入 ${count} 个文件到 ${normalizePath(dest)}`);
      }

      async function copyPathsTo(paths, dest) {
        for (const path of paths) {
          const stat = await fs.stat(path);
          if (normalizePath(path) === normalizePath(dest) || splitPath(path).dir === normalizePath(dest)) continue;
          const target = await fs.uniquePath(dest, stat.name);
          await fs.copy(path, target);
        }
      }

      async function pastePaths(dest) {
        if (!state.clipboard.paths.length) return;
        for (const path of state.clipboard.paths) {
          const info = await fs.stat(path);
          const target = await fs.uniquePath(dest, info.name);
          if (state.clipboard.op === 'cut') await fs.move(path, target);
          else await fs.copy(path, target);
        }
        if (state.clipboard.op === 'cut') state.clipboard = { op: 'copy', paths: [] };
        toast('粘贴完成');
      }

      async function renamePath(path) {
        const current = baseName(path);
        const next = prompt('输入新名称', current);
        if (!next || next === current) return;
        await fs.rename(path, next);
        toast('已重命名');
      }

      async function deletePaths(paths) {
        if (!paths.length) return;
        if (!confirm(`删除 ${paths.length} 项？`)) return;
        for (const path of paths) await fs.remove(path);
        toast('已删除');
      }

      async function exportPaths(paths) {
        const clean = paths.filter(Boolean).map(normalizePath);
        if (!clean.length) { toast('请先选择要导出的文件', 'danger'); return; }
        if (clean.length === 1) {
          const info = await fs.stat(clean[0]);
          if (info.kind === 'file') {
            const url = await fs.objectURL(clean[0]);
            downloadURL(url, info.name);
            setTimeout(() => URL.revokeObjectURL(url), 5000);
          } else {
            const blob = await createTar([clean[0]]);
            const url = URL.createObjectURL(blob);
            downloadURL(url, `${info.name || 'export'}.tar`);
            setTimeout(() => URL.revokeObjectURL(url), 5000);
          }
        } else {
          const blob = await createTar(clean);
          const url = URL.createObjectURL(blob);
          downloadURL(url, `monsoon-export-${stamp()}.tar`);
          setTimeout(() => URL.revokeObjectURL(url), 5000);
        }
      }

      function downloadURL(url, name) {
        const a = document.createElement('a');
        a.href = url;
        a.download = name;
        document.body.append(a);
        a.click();
        a.remove();
      }

      async function createTar(paths) {
        const chunks = [];
        const addEntry = async (path, rootName = '') => {
          const info = await fs.stat(path);
          const name = rootName || info.name || 'root';
          if (info.kind === 'directory') {
            chunks.push(tarHeader(name.endsWith('/') ? name : `${name}/`, 0, '5'));
            const children = await fs.list(path);
            for (const child of children) await addEntry(child.path, `${name}/${child.name}`);
          } else {
            const buffer = new Uint8Array(await fs.readFile(path, 'arrayBuffer'));
            chunks.push(tarHeader(name, buffer.byteLength, '0'));
            chunks.push(buffer);
            const pad = (512 - (buffer.byteLength % 512)) % 512;
            if (pad) chunks.push(new Uint8Array(pad));
          }
        };
        for (const path of paths) await addEntry(path);
        chunks.push(new Uint8Array(1024));
        return new Blob(chunks, { type: 'application/x-tar' });
      }

      function tarHeader(name, size, type) {
        const out = new Uint8Array(512);
        const write = (str, offset, length) => {
          const bytes = new TextEncoder().encode(str);
          out.set(bytes.slice(0, length), offset);
        };
        const oct = (num, length) => (num.toString(8).padStart(length - 1, '0') + '\0').slice(-length);
        write(name, 0, 100);
        write(oct(0o644, 8), 100, 8);
        write(oct(0, 8), 108, 8);
        write(oct(0, 8), 116, 8);
        write(oct(size, 12), 124, 12);
        write(oct(Math.floor(Date.now() / 1000), 12), 136, 12);
        for (let i = 148; i < 156; i += 1) out[i] = 32;
        write(type, 156, 1);
        write('ustar', 257, 6);
        write('00', 263, 2);
        let sum = 0;
        for (const byte of out) sum += byte;
        write(oct(sum, 8), 148, 8);
        return out;
      }

      async function extractArchiveToFolder(path) {
        const info = await fs.stat(path);
        const dest = await fs.uniquePath(splitPath(path).dir, withoutArchiveExt(info.name));
        await fs.mkdir(dest);
        const count = await extractArchive(path, dest);
        toast(`已解压 ${count} 个条目到 ${dest}`);
        launchApp('explorer', { path: dest });
        await renderDesktop();
      }

      async function extractArchive(path, dest) {
        const lower = baseName(path).toLowerCase();
        const buffer = await fs.readFile(path, 'arrayBuffer');
        if (lower.endsWith('.zip')) return unzip(buffer, dest);
        if (lower.endsWith('.tar')) return untar(buffer, dest);
        if (lower.endsWith('.tar.gz') || lower.endsWith('.tgz')) return untar(await decompress(buffer, 'gzip'), dest);
        if (lower.endsWith('.gz')) {
          const data = await decompress(buffer, 'gzip');
          const outName = baseName(path).replace(/\.gz$/i, '') || 'decompressed.bin';
          await fs.writeFile(await fs.uniquePath(dest, outName), data);
          return 1;
        }
        throw new Error('暂不支持此压缩格式');
      }

      async function decompress(buffer, format) {
        if (!('DecompressionStream' in window)) throw new Error('当前浏览器不支持 DecompressionStream');
        const stream = new Blob([buffer]).stream().pipeThrough(new DecompressionStream(format));
        return new Response(stream).arrayBuffer();
      }

      async function unzip(buffer, dest) {
        const view = new DataView(buffer);
        const bytes = new Uint8Array(buffer);
        const decoder = new TextDecoder();
        let eocd = -1;
        for (let i = bytes.length - 22; i >= Math.max(0, bytes.length - 66000); i -= 1) {
          if (view.getUint32(i, true) === 0x06054b50) { eocd = i; break; }
        }
        if (eocd < 0) throw new Error('ZIP 结构无效');
        const total = view.getUint16(eocd + 10, true);
        let offset = view.getUint32(eocd + 16, true);
        let count = 0;
        for (let i = 0; i < total; i += 1) {
          if (view.getUint32(offset, true) !== 0x02014b50) throw new Error('ZIP 中央目录损坏');
          const flags = view.getUint16(offset + 8, true);
          const method = view.getUint16(offset + 10, true);
          const compSize = view.getUint32(offset + 20, true);
          const nameLen = view.getUint16(offset + 28, true);
          const extraLen = view.getUint16(offset + 30, true);
          const commentLen = view.getUint16(offset + 32, true);
          const localOffset = view.getUint32(offset + 42, true);
          const nameBytes = bytes.slice(offset + 46, offset + 46 + nameLen);
          const rawName = (flags & 0x800) ? new TextDecoder('utf-8').decode(nameBytes) : decoder.decode(nameBytes);
          const safeName = safeArchivePath(rawName);
          offset += 46 + nameLen + extraLen + commentLen;
          if (!safeName) continue;
          if (safeName.endsWith('/')) { await fs.mkdir(joinPath(dest, safeName)); count += 1; continue; }
          const localNameLen = view.getUint16(localOffset + 26, true);
          const localExtraLen = view.getUint16(localOffset + 28, true);
          const dataStart = localOffset + 30 + localNameLen + localExtraLen;
          const compressed = buffer.slice(dataStart, dataStart + compSize);
          let data;
          if (method === 0) data = compressed;
          else if (method === 8) data = await decompress(compressed, 'deflate-raw');
          else throw new Error(`ZIP 压缩方法 ${method} 暂不支持`);
          await fs.writeFile(await fs.uniquePath(splitPath(joinPath(dest, safeName)).dir, baseName(safeName)), data);
          count += 1;
        }
        return count;
      }

      async function untar(buffer, dest) {
        const bytes = new Uint8Array(buffer);
        const decoder = new TextDecoder();
        let offset = 0;
        let count = 0;
        while (offset + 512 <= bytes.length) {
          const block = bytes.slice(offset, offset + 512);
          if (block.every(byte => byte === 0)) break;
          const name = readTarString(block, 0, 100);
          const prefix = readTarString(block, 345, 155);
          const fullName = safeArchivePath(prefix ? `${prefix}/${name}` : name);
          const size = parseInt(readTarString(block, 124, 12).trim() || '0', 8);
          const type = String.fromCharCode(block[156] || 48);
          offset += 512;
          if (fullName) {
            if (type === '5' || fullName.endsWith('/')) await fs.mkdir(joinPath(dest, fullName));
            else await fs.writeFile(await fs.uniquePath(splitPath(joinPath(dest, fullName)).dir, baseName(fullName)), bytes.slice(offset, offset + size));
            count += 1;
          }
          offset += Math.ceil(size / 512) * 512;
        }
        return count;

        function readTarString(block, start, length) {
          const slice = block.slice(start, start + length);
          const end = slice.indexOf(0);
          return decoder.decode(end >= 0 ? slice.slice(0, end) : slice).trim();
        }
      }

      function safeArchivePath(name) {
        return normalizePath('/' + String(name).replaceAll('\\', '/')).slice(1);
      }

      function toggleFullscreen() {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
        else document.exitFullscreen?.();
      }

      function escapeHTML(value) {
        const span = document.createElement('span');
        span.textContent = String(value);
        return span.innerHTML;
      }

      function tickClock() {
        $('#clock').textContent = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      }

      document.addEventListener('click', event => {
        if (!event.target.closest('#startMenu') && !event.target.closest('#startButton') && !event.target.closest('#contextMenu')) closeMenus();
      });
      document.addEventListener('keydown', event => {
        if (event.key === 'Escape') closeMenus();
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'o') { event.preventDefault(); launchApp('explorer'); }
      });
      window.addEventListener('resize', () => runSafe(renderDesktop));

      async function bootOS() {
        try {
          await fs.init();
          await loadConfig();
          await applyWallpaper();
          renderStartMenu();
          await renderDesktop();
          tickClock();
          setInterval(tickClock, 15000);
          setTimeout(() => boot.classList.add('done'), 500);
        } catch (error) {
          console.error(error);
          boot.innerHTML = `<div class="boot-card"><div class="boot-title">OPFS Required</div><div class="boot-sub" style="max-width:640px;line-height:1.8;letter-spacing:0;text-transform:none">${escapeHTML(error.message)}</div></div>`;
        }
      }

      bootOS();
    })();
  </script>
</body>
