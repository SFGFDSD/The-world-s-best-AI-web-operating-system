<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'Inter', -apple-system, sans-serif;
      overflow: hidden;
    }

    .container {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 40px;
    }

    .system-card {
      position: relative;
      flex: 1;
      max-width: 520px;
      height: 60vh;
      min-height: 400px;
      background: #0a0a0a;
      border: 1px solid #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #fff;
      transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      cursor: pointer;
      overflow: hidden;
    }

    .system-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(600px circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,0.04), transparent 40%);
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    .system-card:hover::before {
      opacity: 1;
    }

    .system-card:hover {
      background: #111;
      border-color: #2a2a2a;
    }

    .system-card .label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 24px;
      transition: color 0.4s;
    }

    .system-card:hover .label {
      color: #666;
    }

    .system-card .name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 16px;
      transition: all 0.4s;
    }

    .system-card:hover .name {
      letter-spacing: -0.01em;
    }

    .system-card .desc {
      font-size: 13px;
      font-weight: 300;
      color: #333;
      letter-spacing: 0.05em;
      transition: color 0.4s;
    }

    .system-card:hover .desc {
      color: #555;
    }

    .system-card .arrow {
      position: absolute;
      bottom: 48px;
      font-size: 20px;
      color: #222;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      transform: translateY(8px);
      opacity: 0;
    }

    .system-card:hover .arrow {
      color: #666;
      transform: translateY(0);
      opacity: 1;
    }

    .divider {
      width: 2px;
      height: 60vh;
      min-height: 400px;
      background: #111;
      position: relative;
    }

    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 4px;
      height: 40px;
      background: #1a1a1a;
      border-radius: 2px;
    }

    .footer {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #222;
      font-weight: 400;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        gap: 2px;
        padding: 20px;
      }
      .system-card {
        width: 100%;
        max-width: none;
        height: 30vh;
        min-height: 200px;
      }
      .divider {
        width: 100%;
        height: 2px;
        min-height: auto;
      }
      .divider::after {
        width: 40px;
        height: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="gpt-5.5-xhigh%20作品.html" class="system-card" id="card1">
      <div class="label">System A</div>
      <div class="name">Monsoon OS</div>
      <div class="desc">OPFS Web Desktop</div>
      <div class="arrow">→</div>
    </a>

    <div class="divider"></div>

    <a href="claude-opus-4-7作品.html" class="system-card" id="card2">
      <div class="label">System B</div>
      <div class="name">Meadow OS</div>
      <div class="desc">A Quiet Computer</div>
      <div class="arrow">→</div>
    </a>
  </div>

  <div class="footer">Select a system to boot</div>

  <script>
    document.querySelectorAll('.system-card').forEach(card => {
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        card.style.setProperty('--mx', x + '%');
        card.style.setProperty('--my', y + '%');
      });
    });
  </script>
</body>
</html>
